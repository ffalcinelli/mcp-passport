name: Documentation

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all tags

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Determine Version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi

      - name: Generate Documentation
        run: |
          cargo doc --no-deps --all-features --html-in-header docs-header.html

      - name: Prepare Deployment Artifact
        run: |
          VERSION_DIR="target/deploy/${{ steps.version.outputs.version }}"
          mkdir -p "$VERSION_DIR"
          # Rustdoc output is in target/doc, we want it in target/deploy/<version>
          cp -r target/doc/* "$VERSION_DIR/"
          
          # Root redirector
          echo '<meta http-equiv="refresh" content="0; url=latest/mcp_passport/index.html">' > target/deploy/index.html
          
          # Generate versions.json correctly
          # Start the array
          echo -n '["latest"' > target/deploy/versions.json
          # Append each tag with a leading comma and quotes
          git tag -l 'v*' | sort -V -r | while read tag; do
            echo -n ", \"$tag\"" >> target/deploy/versions.json
          done
          # Close the array
          echo -n ']' >> target/deploy/versions.json

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: target/deploy
          branch: gh-pages
          target-folder: .
          clean: false
