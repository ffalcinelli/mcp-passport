name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - v[0-9]+.*

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes

  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            build-tool: cargo-zigbuild
          - target: aarch64-apple-darwin
            os: macos-latest
            build-tool: cargo
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            build-tool: cargo-zigbuild
          - target: x86_64-apple-darwin
            os: macos-latest
            build-tool: cargo
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            build-tool: cargo
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          targets: ${{ matrix.target }}

      - name: Install zigbuild
        if: matrix.build-tool == 'cargo-zigbuild'
        run: pip install cargo-zigbuild

      - name: Build Binary
        run: |
          if [ "${{ matrix.build-tool }}" = "cargo-zigbuild" ]; then
            cargo zigbuild --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package Binary
        shell: bash
        run: |
          BIN_NAME="mcp-passport"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BIN_NAME="${BIN_NAME}.exe"
          fi
          
          PKG_NAME="mcp-passport-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p dist
          
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${BIN_NAME}"
            cd dist && zip "../${PKG_NAME}.zip" "${BIN_NAME}"
          else
            cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${BIN_NAME}"
            tar -czf "${PKG_NAME}.tar.gz" -C dist "${BIN_NAME}"
          fi

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          ASSET=$(ls mcp-passport-${{ github.ref_name }}-${{ matrix.target }}.*)
          gh release upload ${{ github.ref_name }} "$ASSET"
