name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2 (matched kcd's hash but v4)
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check code formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    env:
      MCP_PASSPORT_USE_MEMORY_VAULT: 1
      MCP_PASSPORT_SKIP_OPEN_BROWSER: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libsecret-1-dev
      - name: Lint and Code Security Check
        run: cargo clippy -- -D warnings

  audit:
    name: Audit
    runs-on: ubuntu-latest
    env:
      MCP_PASSPORT_USE_MEMORY_VAULT: 1
      MCP_PASSPORT_SKIP_OPEN_BROWSER: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libsecret-1-dev
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: Security audit of dependencies
        run: cargo audit

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    env:
      MCP_PASSPORT_USE_MEMORY_VAULT: 1
      MCP_PASSPORT_SKIP_OPEN_BROWSER: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libsecret-1-dev

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin


      - name: Generate coverage report
        # We need --ignored or similar if we want to run all tests, 
        # but here we just run regular tests.
        # Note: integration tests might need Docker, which is available.
        run: cargo tarpaulin --out Xml --verbose

      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: cobertura.xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cobertura.xml
          fail_ci_if_error: true
